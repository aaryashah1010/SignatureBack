name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd ~/signature/SignatureBack
            git pull origin main
            # Build first so a broken build never takes the running container down.
            docker compose build backend
            # Remove any stale/renamed container holding the name (prevents name conflicts).
            docker ps -aq --filter "name=signature-backend" | xargs -r docker rm -f
            docker compose up -d --no-build --remove-orphans backend
            docker compose ps
            echo "Backend deployment finished."
