name: signature

services:
  postgres:
    image: postgres:16-alpine
    container_name: signature-postgres
    environment:
      POSTGRES_DB: signature_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d signature_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: signature-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    container_name: signature-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: Digital Signature Workflow Platform
      API_PREFIX: /api
      DEBUG: "false"
      LOG_LEVEL: "warning"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/signature_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: super-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      STORAGE_ROOT: /app/storage
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","https://chatapp.sbs"]'
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      # ── Integration (fill in your values) ──────────────────────────────────
      SQLSERVER_URL: "mssql+pyodbc://sa:Newtech%40%231010@69.30.224.78:9759/cpadesk_phase2?driver=ODBC+Driver+17+for+SQL+Server&TrustServerCertificate=yes"
      INTEGRATION_SHARED_SECRET: "ZXNpZ24ubXljcGFkZXNrLmNvbUAyMDI2"
      EXTERNAL_API_BASE_URL: ""
      EXTERNAL_API_AUTH_SECRET: ""
      DOCUMENT_BASE_PATH: ""
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    container_name: signature-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  backend_storage:
